services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: church
      POSTGRES_PASSWORD: church
      POSTGRES_DB: church_presenter
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U church -d church_presenter"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_dev_data:
