<body class="bg-background text-on-background h-screen flex flex-col overflow-hidden font-body-md text-body-md">
<!-- Top Action Bar -->
<header class="flex justify-between items-center p-md z-10 shrink-0">
<div class="flex items-center gap-sm">
<button class="w-lg h-lg flex items-center justify-center rounded-full bg-surface-container-high border border-outline-variant/30 hover:bg-surface-container-highest transition-colors text-on-surface-variant hover:text-on-surface">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<div class="flex flex-col ml-sm">
<span class="font-label-caps text-label-caps text-primary uppercase tracking-widest">Mode Lecture</span>
<h1 class="font-headline-md text-headline-md text-on-surface">Amazing Grace</h1>
</div>
</div>
<div class="flex items-center gap-sm">
<div class="flex items-center gap-xs mr-md bg-surface-container rounded-full p-xs border border-outline-variant/20">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/5 text-on-surface-variant transition-colors">
<span class="material-symbols-outlined" data-icon="text_decrease">text_decrease</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/5 text-on-surface-variant transition-colors">
<span class="material-symbols-outlined" data-icon="text_increase">text_increase</span>
</button>
</div>
<button class="w-lg h-lg flex items-center justify-center rounded-full bg-surface-container-high border border-outline-variant/30 hover:bg-surface-container-highest transition-colors text-on-surface-variant hover:text-on-surface">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center relative px-gutter overflow-y-auto">
<!-- Lyric Block -->
<div class="max-w-4xl w-full text-center py-xl relative">
<!-- Block Indicator -->
<div class="absolute -top-12 left-1/2 -translate-x-1/2">
<span class="inline-block bg-primary-container text-on-primary-container font-label-caps text-label-caps px-sm py-xs rounded-full">Couplet 1</span>
</div>
<!-- Lyrics -->
<div class="font-display-xl text-display-xl text-on-surface space-y-md">
<p>Amazing grace! How sweet the sound</p>
<p>That saved a wretch like me!</p>
<p>I once was lost, but now am found;</p>
<p>Was blind, but now I see.</p>
</div>
<!-- Subtle next block preview -->
<div class="mt-xl opacity-30">
<div class="font-headline-md text-headline-md space-y-xs">
<p>’Twas grace that taught my heart to fear,</p>
<p>And grace my fears relieved;</p>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation / Progress -->
<footer class="p-md flex flex-col gap-md z-10 shrink-0">
<!-- Progress Bar -->
<div class="w-full max-w-3xl mx-auto flex items-center gap-sm">
<span class="font-label-caps text-label-caps text-on-surface-variant w-8 text-right">1:12</span>
<div class="flex-1 h-2 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-secondary to-primary w-1/3 rounded-full relative shadow-[0_0_10px_rgba(192,193,255,0.5)]"></div>
</div>
<span class="font-label-caps text-label-caps text-on-surface-variant w-8">3:45</span>
</div>
<!-- Block Navigator -->
<div class="flex justify-center items-center gap-gutter">
<button class="w-14 h-14 flex items-center justify-center rounded-full bg-surface-container-high border border-outline-variant/30 hover:bg-surface-container-highest transition-colors text-on-surface hover:text-primary">
<span class="material-symbols-outlined text-3xl" data-icon="navigate_before">navigate_before</span>
</button>
<div class="flex items-center gap-sm overflow-x-auto px-md max-w-lg scrollbar-hide py-xs">
<button class="shrink-0 px-md py-sm rounded-full bg-surface-container-highest text-on-surface-variant border border-transparent font-body-md text-body-md hover:bg-white/5 transition-colors">Intro</button>
<button class="shrink-0 px-md py-sm rounded-full bg-primary/20 text-primary border border-primary/50 shadow-[inset_0_0_10px_rgba(192,193,255,0.2)] font-body-md text-body-md">Couplet 1</button>
<button class="shrink-0 px-md py-sm rounded-full bg-surface-container-highest text-on-surface-variant border border-transparent font-body-md text-body-md hover:bg-white/5 transition-colors">Couplet 2</button>
<button class="shrink-0 px-md py-sm rounded-full bg-surface-container-highest text-on-surface-variant border border-transparent font-body-md text-body-md hover:bg-white/5 transition-colors">Refrain</button>

</div>

</button>
</div>
