name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  release:
    types: [published]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Generate Prisma clients
        run: |
          npx prisma generate --schema=apps/web/prisma/schema.prisma
          npx prisma generate --schema=apps/desktop/prisma/schema.pg.prisma
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
          DATABASE_URL_PG: "postgresql://ci:ci@localhost:5432/ci"

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Security audit (high)
        run: npm run audit:high -w @cp/desktop
        continue-on-error: true

  package-win-unsigned:
    needs: verify
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Generate Prisma clients
        run: |
          npx prisma generate --schema=apps/web/prisma/schema.prisma
          npx prisma generate --schema=apps/desktop/prisma/schema.pg.prisma
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
          DATABASE_URL_PG: "postgresql://ci:ci@localhost:5432/ci"

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: church-presenter-win-unsigned
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.yml
          retention-days: 14

