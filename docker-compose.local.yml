services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.docker
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-church} -d ${POSTGRES_DB:-church_presenter}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    restart: unless-stopped
    env_file: .env.docker
    environment:
      # Polling requis sur Windows/WSL2 Docker pour que le hot-reload + Tailwind watcher fonctionne
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3010:3000"
    volumes:
      # Sources montées pour le hot-reload
      - ./apps/web/src:/workspace/apps/web/src
      - ./apps/web/prisma:/workspace/apps/web/prisma
      # next cache persisté entre redémarrages
      - next_cache:/workspace/apps/web/.next
    depends_on:
      db:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    env_file: .env.docker
    working_dir: /workspace/apps/web
    command: >
      sh -c "
        npx prisma migrate deploy &&
        npx tsx prisma/seed/seed-admin.ts
      "
    volumes:
      - ./apps/web/prisma:/workspace/apps/web/prisma
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_local_data:
  next_cache:
